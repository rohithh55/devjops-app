apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: devjops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: 155190456133.dkr.ecr.ap-south-1.amazonaws.com/devjops-backend:v9

        imagePullPolicy: Always

        ports:
        - containerPort: 4000
