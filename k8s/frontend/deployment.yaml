apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: devjops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 155190456133.dkr.ecr.ap-south-1.amazonaws.com/devjops-frontend:v3

        imagePullPolicy: Always

        ports:
        - containerPort: 5173
